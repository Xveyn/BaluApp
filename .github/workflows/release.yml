name: Release APK

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/baluhost-release.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Extract version
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -o '"[^"]*"' | tr -d '"')
          VERSION_CODE=$((1 + ${{ github.run_number }}))
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}-${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      - name: Set versionCode
        run: |
          CURRENT=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          sed -i "s/versionCode = $CURRENT/versionCode = ${{ steps.version.outputs.code }}/" app/build.gradle.kts

      - name: Build Release APK
        env:
          KEYSTORE_PATH: baluhost-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            app/build/outputs/apk/release/app-release.apk \
            --title "Release ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})" \
            --generate-notes
