name: Release to Play Store

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/workflows/ci.yml'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/baluhost-release.jks

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > app/google-services.json

      - name: Auto-increment versionCode
        run: |
          CURRENT=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -o '[0-9]*')
          NEW=$((CURRENT + ${{ github.run_number }}))
          sed -i "s/versionCode = $CURRENT/versionCode = $NEW/" app/build.gradle.kts

      - name: Build Release AAB
        env:
          KEYSTORE_PATH: baluhost-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload to Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.baluhost.android
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
